<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#1a1a2e" />
    <link rel="icon" href="data:," />
    <title>Laundry Day Battle</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        background: #1a1a2e;
        overflow: hidden;
        position: fixed;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #app {
        width: 100vw;
        height: 100vh;
        height: 100dvh; /* avoid mobile browser chrome resize jumps */
        display: flex;
        align-items: center;
        justify-content: center;
        touch-action: none;
      }
      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        touch-action: none;
      }
      /* Ask phones/tablets to rotate to landscape (split-screen needs the width). */
      #rotate {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #1a1a2e;
        color: #ffd1e8;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-family: monospace;
        gap: 18px;
        padding: 24px;
      }
      #rotate .icon { font-size: 64px; animation: spin 2s ease-in-out infinite; }
      #rotate .msg { font-size: 20px; line-height: 1.5; max-width: 480px; }
      @keyframes spin {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(90deg); }
      }
      @media (orientation: portrait) and (pointer: coarse) {
        #rotate { display: flex; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="rotate">
      <div class="icon">📱</div>
      <div class="msg">Rotate your device to landscape<br />to play 2-player split-screen.</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
